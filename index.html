<h1>キュウリ</h1>

<p>
キュウリは夏を代表する野菜です。<br>
水分が多く、サラダや漬物に利用されます。<br>
家庭菜園でも人気があり、比較的育てやすい野菜です。
</p>

<h2>栽培のポイント</h2>

<ul>
<li>日当たりの良い場所で育てる</li>
<li>こまめに水やりをする</li>
<li>支柱を立ててつるを伸ばす</li>
</ul>
